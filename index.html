<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نشر المواقع - ارفع موقعك الآن</title>
    
    <!-- ========== الجزء الأول: CSS ========== -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .upload-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
        }

        .file-list {
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
        }

        .file-item {
            padding: 5px;
            font-size: 14px;
            color: #666;
            border-bottom: 1px solid #eee;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .my-sites {
            background: white;
            border-radius: 20px;
            padding: 20px;
        }

        .my-sites h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .site-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .site-info {
            flex: 1;
        }

        .site-name {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1rem;
        }

        .site-link {
            color: #28a745;
            text-decoration: none;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .site-link:hover {
            text-decoration: underline;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .empty-sites {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        small {
            color: #666;
            font-size: 12px;
        }

        .note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            color: #856404;
        }
    </style>
</head>
<body>
    <!-- ========== الجزء الثاني: HTML ========== -->
<div class="container">
    <header>
        <h1>🚀 منصة نشر المواقع</h1>
        <p>ارفع ملفات موقعك واحصل على رابط مباشر</p>
    </header>

    <div class="upload-section">
        <div class="form-group">
            <label>🏷️ اسم الموقع</label>
            <input type="text" id="siteName" placeholder="مثال: mywebsite" dir="ltr">
            <small>سيتم إنشاء رابط لموقعك</small>
        </div>

        <div class="form-group">
            <label>📁 ملفات الموقع (HTML, CSS, JS, صور)</label>
            <input type="file" id="fileInput" multiple>
            <small>اختر جميع ملفات موقعك (يجب وجود ملف index.html)</small>
        </div>

        <div id="fileList" class="file-list" style="display:none"></div>

        <button id="uploadBtn" class="btn-primary">🚀 نشر الموقع</button>
        
        <div id="progressBar" class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        
        <div id="result" class="result"></div>

        <div class="note">
            💡 ملاحظة: الموقع يحفظ بياناتك في متصفحك فقط. الرابط المُنشأ هو رابط محلي (blob:) يمكنك مشاركته مع أي شخص.
        </div>
    </div>

    <div class="my-sites">
        <h2>📊 مواقعي المنشورة</h2>
        <div id="mySitesList"></div>
    </div>
</div>
<!-- ========== الجزء الثالث: JavaScript ========== -->
<script>
    // تخزين المواقع
    let userSites = [];

    // تحميل المواقع المحفوظة
    function loadSites() {
        const stored = localStorage.getItem('publishedSites');
        if (stored) {
            userSites = JSON.parse(stored);
            displaySites();
        }
    }

    // حفظ المواقع
    function saveSites() {
        localStorage.setItem('publishedSites', JSON.stringify(userSites));
        displaySites();
    }

    // عرض المواقع
    function displaySites() {
        const container = document.getElementById('mySitesList');
        if (!container) return;
        
        if (userSites.length === 0) {
            container.innerHTML = '<div class="empty-sites">📭 لم تنشر أي موقع بعد</div>';
            return;
        }
        
        container.innerHTML = userSites.map(site => `
            <div class="site-card">
                <div class="site-info">
                    <div class="site-name">${escapeHtml(site.name)}</div>
                    <a href="${site.url}" target="_blank" class="site-link">${site.url}</a>
                    <div style="font-size:12px; color:#999; margin-top:5px;">${new Date(site.date).toLocaleString('ar')}</div>
                </div>
                <button class="delete-btn" onclick="deleteSite('${site.id}')">🗑️ حذف</button>
            </div>
        `).join('');
    }

    // حذف موقع
    function deleteSite(id) {
        if (confirm('هل أنت متأكد من حذف هذا الموقع؟')) {
            userSites = userSites.filter(site => site.id !== id);
            saveSites();
        }
    }

    // تنصيب النصوص
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // عرض الملفات المختارة
    let selectedFiles = [];

    function handleFileSelect(event) {
        const files = Array.from(event.target.files);
        selectedFiles = files;
        
        const fileListDiv = document.getElementById('fileList');
        if (files.length === 0) {
            fileListDiv.style.display = 'none';
            return;
        }
        
        let html = '';
        for (let i = 0; i < Math.min(files.length, 30); i++) {
            const file = files[i];
            let icon = '📄';
            if (file.name.endsWith('.html')) icon = '🌐';
            else if (file.name.endsWith('.css')) icon = '🎨';
            else if (file.name.endsWith('.js')) icon = '⚙️';
            else if (file.name.match(/\.(jpg|jpeg|png|gif|svg)$/i)) icon = '🖼️';
            html += `<div class="file-item">${icon} ${escapeHtml(file.name)} (${(file.size/1024).toFixed(1)} KB)</div>`;
        }
        if (files.length > 30) {
            html += `<div class="file-item">... و ${files.length - 30} ملف آخر</div>`;
        }
        fileListDiv.innerHTML = html;
        fileListDiv.style.display = 'block';
    }

    // نشر الموقع
    async function publishSite() {
        const siteName = document.getElementById('siteName').value.trim();
        const uploadBtn = document.getElementById('uploadBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        
        
        
        if (selectedFiles.length === 0) {
            showResult('❌ من فضلك اختر ملفات الموقع', 'error');
            return;
        }
        
        const hasIndex = selectedFiles.some(f => f.name.toLowerCase() === 'index.html');
        if (!hasIndex) {
            showResult('⚠️ الموقع يجب أن يحتوي على ملف index.html', 'error');
            return;
        }
        
        const siteId = Date.now().toString();
        
        uploadBtn.disabled = true;
        progressBar.style.display = 'block';
        progressFill.style.width = '20%';
        progressFill.textContent = 'جاري تجهيز الملفات...';
        
        try {
            const filesMap = new Map();
            for (const file of selectedFiles) {
                let path = file.webkitRelativePath || file.name;
                if (path.includes('/')) {
                    path = path.split('/').slice(1).join('/');
                }
                filesMap.set(path, file);
            }
            
            progressFill.style.width = '50%';
            progressFill.textContent = 'جاري إنشاء الرابط...';
            
            const siteUrl = await createSitePreview(filesMap, siteName);
            
            progressFill.style.width = '100%';
            progressFill.textContent = 'تم النشر!';
            
            const newSite = {
                id: siteId,
                name: siteName,
                url: siteUrl,
                date: new Date().toISOString(),
                files: selectedFiles.map(f => f.name)
            };
            
            userSites.unshift(newSite);
            saveSites();
            
            showResult(`
                ✅ تم نشر موقع "${escapeHtml(siteName)}" بنجاح!<br><br>
                🔗 رابط موقعك: <a href="${siteUrl}" target="_blank">${siteUrl}</a><br><br>
                💡 يمكنك نسخ هذا الرابط ومشاركته مع أي شخص
            `, 'success');
            
            document.getElementById('siteName').value = '';
            document.getElementById('fileInput').value = '';
            selectedFiles = [];
            document.getElementById('fileList').style.display = 'none';
            document.getElementById('fileList').innerHTML = '';
            
        } catch (error) {
            console.error(error);
            showResult('❌ حدث خطأ: ' + error.message, 'error');
        } finally {
            uploadBtn.disabled = false;
            setTimeout(() => {
                progressBar.style.display = 'none';
                progressFill.style.width = '0%';
            }, 2000);
        }
    }

    // إنشاء معاينة للموقع
    async function createSitePreview(filesMap, siteName) {
        let indexFile = filesMap.get('index.html');
        if (!indexFile) {
            for (const [path, file] of filesMap) {
                if (path.endsWith('index.html')) {
                    indexFile = file;
                    break;
                }
            }
        }
        
        if (!indexFile) {
            throw new Error('لم يتم العثور على ملف index.html');
        }
        
        const indexContent = await readFileAsText(indexFile);
        const blobHtml = await generateSiteViewer(filesMap, indexContent, siteName);
        const blob = new Blob([blobHtml], { type: 'text/html' });
        return URL.createObjectURL(blob);
    }

    function readFileAsText(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsText(file);
        });
    }

    function readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    async function generateSiteViewer(filesMap, indexContent, siteName) {
        const fileDataUrls = new Map();
        
        for (const [path, file] of filesMap) {
            if (file.type.startsWith('image/') || file.type === 'application/pdf') {
                const dataUrl = await readFileAsDataURL(file);
                fileDataUrls.set(path, dataUrl);
            } else if (path.endsWith('.css') || path.endsWith('.js')) {
                const content = await readFileAsText(file);
                fileDataUrls.set(path, content);
            }
        }
        
        let modifiedContent = indexContent;
        
        for (const [path, data] of fileDataUrls) {
            const fileName = path.split('/').pop();
            const escapedFileName = fileName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            modifiedContent = modifiedContent.replace(new RegExp(`(src|href)=["']([^"']*${escapedFileName})["']`, 'gi'), `$1="${data}"`);
            modifiedContent = modifiedContent.replace(new RegExp(`url\\(["']?([^"']*${escapedFileName})["']?\\)`, 'gi'), `url("${data}")`);
        }
        
        const encodedContent = modifiedContent.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        
        return `
<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${escapeHtml(siteName)} - عرض الموقع</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #f0f0f0; }
        .header {
            background: #667eea;
            color: white;
            padding: 10px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .iframe-container {
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .note {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <div class="header">
        📁 ${escapeHtml(siteName)} | معاينة الموقع
    </div>
    <div class="iframe-container">
        <iframe srcdoc="${encodedContent}"></iframe>
    </div>
    <div class="note">
        ⚡ هذا الرابط مؤقت - احفظ الرابط لمشاركته
    </div>
</body>
</html>
        `;
    }

    function showResult(message, type) {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = message;
        resultDiv.className = `result ${type}`;
        setTimeout(() => {
            resultDiv.className = 'result';
            resultDiv.innerHTML = '';
        }, 10000);
    }

    // تشغيل الكود بعد تحميل الصفحة
    document.addEventListener('DOMContentLoaded', () => {
        loadSites();
        
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        
        if (fileInput) {
            fileInput.addEventListener('change', handleFileSelect);
        }
        
        if (uploadBtn) {
            uploadBtn.addEventListener('click', publishSite);
        }
    });
</script>

</body>
</html>
