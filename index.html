<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نشر المواقع</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .auth-section, .upload-section, .my-sites {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        .btn-google {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        .file-list {
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .site-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .site-link {
            color: #28a745;
            text-decoration: none;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 منصة نشر المواقع</h1>
            <p>ارفع موقعك واحصل على رابط دائم</p>
        </header>

        <div id="authSection" class="auth-section">
            <button id="loginBtn" class="btn-google">🔐 تسجيل دخول بجوجل</button>
        </div>

        <div id="uploadSection" class="upload-section" style="display:none">
            <div class="user-info">
                <span>👤 <span id="userEmail"></span></span>
                <button id="logoutBtn" class="delete-btn" style="background:#6c757d">تسجيل خروج</button>
            </div>
            
            <div class="form-group">
                <label>🏷️ اسم الموقع</label>
                <input type="text" id="siteName" placeholder="مثال: mywebsite">
            </div>

            <div class="form-group">
                <label>📁 ملفات الموقع</label>
                <input type="file" id="fileInput" multiple>
            </div>

            <div id="fileList" class="file-list"></div>

            <button id="uploadBtn" class="btn-primary">🚀 نشر الموقع</button>
            <div id="result" class="result"></div>
        </div>

        <div id="sitesSection" class="my-sites" style="display:none">
            <h2>📊 مواقعي المنشورة</h2>
            <div id="mySitesList"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
    // =================== إعداد Supabase ===================
    // ⚠️ حط هنا الرابط والمفتاح بتاعك
    const SUPABASE_URL = 'https://ddblsplxzoncnbrcplyr.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_I5yfw7xvocMT_QefTPRkKA_Ozyp1Nui';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // =================== المتغيرات العامة ===================
    let currentUser = null;
    let selectedFiles = [];
    
    // =================== عناصر الصفحة ===================
    const authSection = document.getElementById('authSection');
    const uploadSection = document.getElementById('uploadSection');
    const sitesSection = document.getElementById('sitesSection');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const siteNameInput = document.getElementById('siteName');
    const userEmailSpan = document.getElementById('userEmail');
    const mySitesList = document.getElementById('mySitesList');
    const resultDiv = document.getElementById('result');
    const fileListDiv = document.getElementById('fileList');
    
    // =================== عرض الرسائل ===================
    function showResult(message, type) {
        resultDiv.innerHTML = message;
        resultDiv.className = `result ${type}`;
        setTimeout(() => {
            resultDiv.className = 'result';
            resultDiv.innerHTML = '';
        }, 5000);
    }
    
    // =================== عرض الملفات المختارة ===================
    function updateFileList() {
        if (selectedFiles.length === 0) {
            fileListDiv.innerHTML = '';
            fileListDiv.style.display = 'none';
            return;
        }
        
        fileListDiv.style.display = 'block';
        let html = '<strong>الملفات المختارة:</strong><br>';
        for (let i = 0; i < Math.min(selectedFiles.length, 20); i++) {
            const file = selectedFiles[i];
            let icon = '📄';
            if (file.name.endsWith('.html')) icon = '🌐';
            else if (file.name.endsWith('.css')) icon = '🎨';
            else if (file.name.endsWith('.js')) icon = '⚙️';
            else if (file.name.match(/\.(jpg|jpeg|png|gif|svg)$/i)) icon = '🖼️';
            html += `<div>${icon} ${escapeHtml(file.name)} (${(file.size/1024).toFixed(1)} KB)</div>`;
        }
        if (selectedFiles.length > 20) {
            html += `<div>... و ${selectedFiles.length - 20} ملف آخر</div>`;
        }
        fileListDiv.innerHTML = html;
    }
    
    // =================== تنصيب النصوص ===================
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // =================== رفع ملف إلى Supabase Storage ===================
    async function uploadFileToStorage(file, siteId, filePath) {
        try {
            const { data, error } = await supabase.storage
                .from('sites')
                .upload(`${currentUser.id}/${siteId}/${filePath}`, file, {
                    upsert: true
                });
            
            if (error) throw error;
            return data.path;
        } catch (error) {
            console.error('خطأ في رفع الملف:', error);
            throw error;
        }
    }
    
    // =================== حفظ معلومات الملف في قاعدة البيانات ===================
    async function saveFileRecord(siteId, file, filePath) {
        try {
            const { error } = await supabase
                .from('site_files')
                .insert({
                    site_id: siteId,
                    file_path: filePath,
                    file_name: file.name,
                    file_type: file.type,
                    file_size: file.size
                });
            
            if (error) throw error;
        } catch (error) {
            console.error('خطأ في حفظ معلومات الملف:', error);
            throw error;
        }
    }
    
    // =================== نشر الموقع ===================
    async function publishSite() {
        const siteName = siteNameInput.value.trim();
        
        if (!siteName) {
            showResult('❌ من فضلك أدخل اسم الموقع', 'error');
            return;
        }
        
        if (selectedFiles.length === 0) {
            showResult('❌ من فضلك اختر ملفات الموقع', 'error');
            return;
        }
        
        const htmlFiles = selectedFiles.filter(f => f.name.endsWith('.html') || f.name.endsWith('.htm'));
        if (htmlFiles.length === 0) {
            showResult('⚠️ الموقع يجب أن يحتوي على ملف HTML واحد على الأقل', 'error');
            return;
        }
        
        uploadBtn.disabled = true;
        uploadBtn.textContent = 'جاري النشر...';
        
        try {
            // 1. إنشاء سجل الموقع في قاعدة البيانات
            const siteUrl = `https://${SUPABASE_URL.replace('https://', '')}/storage/v1/object/public/sites/${currentUser.id}/${Date.now()}/index.html`;
            
            const { data: siteData, error: siteError } = await supabase
                .from('sites')
                .insert({
                    user_id: currentUser.id,
                    site_name: siteName,
                    site_url: siteUrl
                })
                .select()
                .single();
            
            if (siteError) throw siteError;
            
            const siteId = siteData.id;
            const timestamp = Date.now();
            
            // 2. رفع جميع الملفات
            let uploadedCount = 0;
            for (const file of selectedFiles) {
                let filePath = file.name;
                if (file.webkitRelativePath) {
                    filePath = file.webkitRelativePath.split('/').slice(1).join('/');
                }
                filePath = `${timestamp}/${filePath}`;
                
                await uploadFileToStorage(file, siteId, filePath);
                await saveFileRecord(siteId, file, filePath);
                uploadedCount++;
                
                // تحديث التقدم
                uploadBtn.textContent = `جاري النشر... ${Math.round(uploadedCount/selectedFiles.length * 100)}%`;
            }
            
            // 3. تحديث رابط الموقع النهائي
            const finalUrl = `${SUPABASE_URL}/storage/v1/object/public/sites/${currentUser.id}/${siteId}/${timestamp}/index.html`;
            
            const { error: updateError } = await supabase
                .from('sites')
                .update({ site_url: finalUrl })
                .eq('id', siteId);
            
            if (updateError) throw updateError;
            
            showResult(`
                ✅ تم نشر موقع "${escapeHtml(siteName)}" بنجاح!<br><br>
                🔗 رابط موقعك: <a href="${finalUrl}" target="_blank">${finalUrl}</a><br><br>
                💡 يمكنك مشاركة هذا الرابط مع أي شخص
            `, 'success');
            
            // تنظيف
            siteNameInput.value = '';
            fileInput.value = '';
            selectedFiles = [];
            updateFileList();
            
            // إعادة تحميل قائمة المواقع
            loadUserSites();
            
        } catch (error) {
            console.error('خطأ في النشر:', error);
            showResult('❌ حدث خطأ أثناء نشر الموقع: ' + error.message, 'error');
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.textContent = '🚀 نشر الموقع';
        }
    }

            // =================== تحميل مواقع المستخدم ===================
    async function loadUserSites() {
        if (!currentUser) return;
        
        try {
            const { data, error } = await supabase
                .from('sites')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            if (data.length === 0) {
                mySitesList.innerHTML = '<div class="empty-sites">📭 لم تنشر أي موقع بعد</div>';
                return;
            }
            
            mySitesList.innerHTML = data.map(site => `
                <div class="site-card">
                    <div>
                        <div class="site-name">${escapeHtml(site.site_name)}</div>
                        <a href="${site.site_url}" target="_blank" class="site-link">${site.site_url}</a>
                        <div style="font-size:12px; color:#999; margin-top:5px;">
                            ${new Date(site.created_at).toLocaleString('ar')}
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteSite('${site.id}')">🗑️ حذف</button>
                </div>
            `).join('');
            
        } catch (error) {
            console.error('خطأ في تحميل المواقع:', error);
            showResult('❌ حدث خطأ في تحميل المواقع', 'error');
        }
    }
    
    // =================== حذف موقع ===================
    async function deleteSite(siteId) {
        if (!confirm('هل أنت متأكد من حذف هذا الموقع نهائياً؟')) return;
        
        try {
            // 1. جلب ملفات الموقع
            const { data: files, error: filesError } = await supabase
                .from('site_files')
                .select('file_path')
                .eq('site_id', siteId);
            
            if (filesError) throw filesError;
            
            // 2. حذف الملفات من التخزين
            if (files && files.length > 0) {
                const filePaths = files.map(f => `${currentUser.id}/${siteId}/${f.file_path}`);
                const { error: storageError } = await supabase.storage
                    .from('sites')
                    .remove(filePaths);
                
                if (storageError) console.error('خطأ في حذف الملفات:', storageError);
            }
            
            // 3. حذف سجلات الملفات
            const { error: deleteFilesError } = await supabase
                .from('site_files')
                .delete()
                .eq('site_id', siteId);
            
            if (deleteFilesError) throw deleteFilesError;
            
            // 4. حذف سجل الموقع
            const { error: deleteSiteError } = await supabase
                .from('sites')
                .delete()
                .eq('id', siteId);
            
            if (deleteSiteError) throw deleteSiteError;
            
            showResult('✅ تم حذف الموقع بنجاح', 'success');
            loadUserSites();
            
        } catch (error) {
            console.error('خطأ في الحذف:', error);
            showResult('❌ حدث خطأ أثناء حذف الموقع', 'error');
        }
    }
    
    // =================== تسجيل الدخول بجوجل ===================
    async function loginWithGoogle() {
        try {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin
                }
            });
            
            if (error) throw error;
            
        } catch (error) {
            console.error('خطأ في تسجيل الدخول:', error);
            showResult('❌ حدث خطأ في تسجيل الدخول', 'error');
        }
    }
    
    // =================== تسجيل الخروج ===================
    async function logout() {
        try {
            const { error } = await supabase.auth.signOut();
            if (error) throw error;
            
            currentUser = null;
            authSection.style.display = 'block';
            uploadSection.style.display = 'none';
            sitesSection.style.display = 'none';
            
            showResult('👋 تم تسجيل الخروج بنجاح', 'success');
            
        } catch (error) {
            console.error('خطأ في تسجيل الخروج:', error);
            showResult('❌ حدث خطأ في تسجيل الخروج', 'error');
        }
    }
    
    // =================== التحقق من حالة المستخدم ===================
    async function checkUser() {
        const { data: { user }, error } = await supabase.auth.getUser();
        
        if (error || !user) {
            currentUser = null;
            authSection.style.display = 'block';
            uploadSection.style.display = 'none';
            sitesSection.style.display = 'none';
            return;
        }
        
        currentUser = {
            id: user.id,
            email: user.email
        };
        
        authSection.style.display = 'none';
        uploadSection.style.display = 'block';
        sitesSection.style.display = 'block';
        userEmailSpan.textContent = user.email;
        
        loadUserSites();
    }
    
    // =================== معالج اختيار الملفات ===================
    function handleFileSelect(event) {
        const files = Array.from(event.target.files);
        selectedFiles = files;
        updateFileList();
    }
    
    // =================== إضافة مستمعي الأحداث ===================
    function setupEventListeners() {
        loginBtn.addEventListener('click', loginWithGoogle);
        logoutBtn.addEventListener('click', logout);
        uploadBtn.addEventListener('click', publishSite);
        fileInput.addEventListener('change', handleFileSelect);
    }
    
    // =================== تشغيل التطبيق ===================
    async function init() {
        setupEventListeners();
        await checkUser();
        
        // الاستماع لتغيرات حالة المصادقة
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session?.user) {
                currentUser = {
                    id: session.user.id,
                    email: session.user.email
                };
                authSection.style.display = 'none';
                uploadSection.style.display = 'block';
                sitesSection.style.display = 'block';
                userEmailSpan.textContent = session.user.email;
                loadUserSites();
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                authSection.style.display = 'block';
                uploadSection.style.display = 'none';
                sitesSection.style.display = 'none';
            }
        });
    }
    
    // بدء التطبيق
    init();
</script>

</body>
</html>
